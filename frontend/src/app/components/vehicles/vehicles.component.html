<div class="card">
    <div class="card-header">
        <h2>{{ editingVehicleId ? 'Edit Vehicle' : 'My Vehicles' }}</h2>
        <button class="btn btn-primary" (click)="showAddForm = !showAddForm">
            {{ showAddForm ? 'Cancel' : 'Register New Vehicle' }}
        </button>
    </div>

    <div *ngIf="showAddForm" class="add-form">
        <form [formGroup]="vehicleForm" (ngSubmit)="onSubmit()">
            <div class="form-group">
                <label for="licensePlate">License Plate</label>
                <input type="text" id="licensePlate" formControlName="licensePlate" class="form-control">
            </div>
            <div class="form-group">
                <label for="model">Model</label>
                <input type="text" id="model" formControlName="model" class="form-control">
            </div>
            <div class="form-group">
                <label for="color">Color</label>
                <input type="text" id="color" formControlName="color" class="form-control">
            </div>
            <div class="form-group">
                <label for="vehicleType">Vehicle Type</label>
                <select id="vehicleType" formControlName="vehicleType" class="form-control">
                    <option value="" disabled selected>Select vehicle type</option>
                    <option *ngFor="let vt of vehicleTypes" [value]="vt.name">{{vt.name}}</option>
                </select>
            </div>
            <div class="form-group">
                <label for="engineType">Engine Type</label>
                <select id="engineType" formControlName="engineType" class="form-control">
                    <option value="" disabled selected>Select engine type</option>
                    <option *ngFor="let et of engineTypes" [value]="et.name">{{et.name}}</option>
                </select>
            </div>
            <button type="submit" class="btn btn-success" [disabled]="vehicleForm.invalid">
                {{ editingVehicleId ? 'Update' : 'Register' }}
            </button>
        </form>
    </div>

    <table class="table">
        <thead>
            <tr>
                <th>License Plate</th>
                <th>Model</th>
                <th>Color</th>
                <th>Type</th>
                <th>Engine</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr *ngFor="let v of vehicles">
                <td>{{ v.licensePlate }}</td>
                <td>{{ v.model }}</td>
                <td>{{ v.color }}</td>
                <td>{{ v.vehicleType }}</td>
                <td>{{ v.engineType }}</td>
                <td>
                    <div class="actions">
                        <button *ngIf="currentUser?.role === 'CITIZEN'" (click)="editVehicle(v)"
                            class="btn btn-primary btn-sm" style="margin-right: 10px;">
                            Edit
                        </button>
                        <button *ngIf="currentUser?.role === 'CITIZEN'" (click)="simulateViolation(v)"
                            class="btn btn-warning btn-sm" style="margin-right: 10px;">
                            Demo Violation
                        </button>
                        <button class="btn btn-danger btn-sm" (click)="deleteVehicle(v.id)">Delete</button>
                    </div>
                </td>
            </tr>
            <tr *ngIf="vehicles.length === 0">
                <td colspan="6" class="text-center">No vehicles registered yet.</td>
            </tr>
        </tbody>
    </table>
</div>
