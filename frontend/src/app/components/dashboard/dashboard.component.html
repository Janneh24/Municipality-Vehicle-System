<div class="dashboard-container">
    <nav class="sidebar">
        <div class="logo">Municipality Motor Vehicle System</div>
        <ul>
            <li routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">
                <a routerLink="/dashboard">Summary</a>
            </li>
            <li routerLinkActive="active" *ngIf="currentUser?.role === 'CITIZEN' || currentUser?.role === 'ADMIN'">
                <a routerLink="/dashboard/vehicles">Vehicles</a>
            </li>
            <li routerLinkActive="active" *ngIf="currentUser?.role === 'CITIZEN' || currentUser?.role === 'ADMIN'">
                <a routerLink="/dashboard/passes">Parking Passes</a>
            </li>
            <li routerLinkActive="active" *ngIf="currentUser?.role === 'ADMIN'">
                <a routerLink="/dashboard/back-office">Back Office</a>
            </li>
        </ul>
        <div class="user-info" *ngIf="currentUser">
            <p>{{ currentUser.fullName }}</p>
            <p class="role-badge">{{ currentUser.role }}</p>
            <button (click)="logout()" class="btn-logout">Logout</button>
        </div>
    </nav>
    <main class="content">
        <router-outlet></router-outlet>
    </main>
</div>
