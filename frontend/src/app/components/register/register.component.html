<div class="login-container">
    <div class="login-card">
        <h1>Municipality Motor Vehicle System</h1>
        <h2>Register</h2>
        <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
            <div class="form-group">
                <label for="fullName">Full Name</label>
                <input type="text" id="fullName" formControlName="fullName" class="form-control"
                    placeholder="Enter your full name">
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" formControlName="email" class="form-control"
                    placeholder="Enter your email">
            </div>
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" formControlName="username" class="form-control"
                    placeholder="Choose a username">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" formControlName="password" class="form-control"
                    placeholder="Choose a password">
            </div>
            <div class="form-group">
                <label for="district">Florence District</label>
                <select id="district" formControlName="district" class="form-control">
                    <option value="" disabled selected>Select your district</option>
                    <option *ngFor="let d of districts" [value]="d.name">{{d.name}}</option>
                </select>
            </div>
            <div class="form-group">
                <label for="role">Role</label>
                <select id="role" formControlName="role" class="form-control">
                    <option value="CITIZEN">Resident Citizen</option>
                    <option value="ADMIN">Administrative Staff</option>
                    <option value="LAW_ENFORCEMENT">Law Enforcement</option>
                </select>
            </div>
            <div *ngIf="error" class="error-message">
                {{ error }}
            </div>
            <button type="submit" [disabled]="registerForm.invalid" class="btn-login">Register</button>
            <p class="mt-3">Already have an account? <a routerLink="/login">Login here</a></p>
        </form>
    </div>
</div>
