<div class="login-container">
  <div class="login-card">
    <h1>Municipality Motor Vehicle System</h1>
    <h2>Login</h2>
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" formControlName="username" class="form-control" placeholder="Enter username">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" formControlName="password" class="form-control"
          placeholder="Enter password">
      </div>
      <div *ngIf="error" class="error-message">
        {{ error }}
      </div>
      <button type="submit" [disabled]="loginForm.invalid" class="btn-login">Login</button>
      <p class="mt-3">Don't have an account? <a routerLink="/register">Register here</a></p>
    </form>
  </div>
</div>
